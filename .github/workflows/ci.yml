name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: typecheck · lint · test · build
    runs-on: ubuntu-latest
    # Successful runs finish in ~1 min. Anything past 10 means something
    # hung (e.g. an ESLint runaway-memory loop) — kill it fast so a stuck
    # job doesn't burn the full 6-hour Actions default.
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          package-manager-cache: false

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/cache@v4
        with:
          path: .yarn/cache
          key: yarn-${{ runner.os }}-${{ hashFiles('yarn.lock', '.yarnrc.yml') }}
          restore-keys: |
            yarn-${{ runner.os }}-

      - name: Install dependencies
        run: yarn install --immutable

      - name: Typecheck
        run: yarn typecheck

      - name: Lint
        run: yarn lint

      - name: Test
        run: yarn test

      - name: Build
        run: yarn build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

  integration:
    name: cross-tenant integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: cite_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/cite_test
      INTEGRATION_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/cite_test
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          package-manager-cache: false

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/cache@v4
        with:
          path: .yarn/cache
          key: yarn-${{ runner.os }}-${{ hashFiles('yarn.lock', '.yarnrc.yml') }}
          restore-keys: |
            yarn-${{ runner.os }}-

      - name: Install dependencies
        run: yarn install --immutable

      - name: Bootstrap Supabase shims + pgvector
        # setup.sql expects pgvector + Supabase's auth.users / auth.uid() /
        # storage.buckets. Create the minimal stubs so the test DB looks
        # enough like Supabase from the SQL's perspective. pgvector must
        # also exist BEFORE prisma db push because the schema declares a
        # `vector(2048)` column type.
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -d cite_test <<'SQL'
          CREATE EXTENSION IF NOT EXISTS vector;
          CREATE EXTENSION IF NOT EXISTS pgcrypto;
          CREATE EXTENSION IF NOT EXISTS "uuid-ossp";
          CREATE SCHEMA IF NOT EXISTS auth;
          CREATE TABLE IF NOT EXISTS auth.users (
            id uuid PRIMARY KEY,
            email text,
            raw_user_meta_data jsonb,
            created_at timestamptz DEFAULT NOW(),
            updated_at timestamptz DEFAULT NOW()
          );
          CREATE OR REPLACE FUNCTION auth.uid() RETURNS uuid LANGUAGE sql STABLE AS $$ SELECT NULL::uuid $$;
          CREATE SCHEMA IF NOT EXISTS storage;
          CREATE TABLE IF NOT EXISTS storage.buckets (
            id text PRIMARY KEY,
            name text,
            public boolean,
            file_size_limit bigint,
            allowed_mime_types text[]
          );
          SQL

      - name: Push Prisma schema
        run: yarn db:push --accept-data-loss

      - name: Run integration tests
        run: yarn test:integration
